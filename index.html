<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="keywords" content="web, html, css, javascript, js, java, python,POS,SYSTEM">
    <meta name="description" content="World best web development tutorials">
    <meta name="author" content="IJSE">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>POS SYSTEM </title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>





</head>
<body>

<!-- ================= LOGIN PAGE ================= -->
<div id="loginPage" class="container-fluid">
    <div class="row">


        <div class="col-md-5 left-side">
            <h1>SCS SUPER MART</h1>
            <img src="https://cdn-icons-png.flaticon.com/512/263/263142.png">
        </div>


        <div class="col-md-7 right-side">
            <div class="form">
                <h3 class="text-center">Welcome Back!</h3>
                <p class="text-center">Login to your account</p>

                <h6>Username    :</h6>
                <input type="text" id="username" class="form-control " placeholder="Enter Username">
                <h6>Password    :</h6>
                <input type="password" id="password" class="form-control " placeholder="Enter Password">

                <a href="#" class="forgot">Forgot password?</a>

                <button class="login-btn " id="loginBtn">Login</button>

                <p class=" text_error" id="errorMsg"></p>
            </div>
        </div>

    </div>
</div>



<!-- ================= Dashboard  ================= -->

<div id="dashboard">

    <nav id="navbar" class="navbar navbar-expand-lg ">

        <a class="navbar-brand fw-bold">SCS Super Market</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a id="homeBtn"   class="nav-link active" href="#">Home</a>
                </li>

                <li class="nav-item">
                    <a   id="customerBtn" class="nav-link" href="#">Customers</a>
                </li>

                <li class="nav-item">
                    <a id="itemBtn" class="nav-link" href="#">Items</a>
                </li>

                <li class="nav-item">
                    <a id="orderBtn" class="nav-link" href="#">Orders</a>
                </li>

                <li class="nav-item">
                    <a id="logoutBtn" class="nav-link text-danger" href="#">Logout</a>
                </li>

            </ul>
        </div>

    </nav>


    <div id="homeSection" class="section">
        <h2>Welcome to Dashboard </h2>


    </div>



    <div id="itemSection" class="section">
        <h2>Item Management</h2>

    </div>




    <div id="orderSection" class="section">
        <h2>Order Management</h2>

    </div>

</div>

<!-- ================= Customer Section  ================= -->
<div id="customerSection" class="section">

    <h2>Customer Management</h2>

    <form id="customerForm  " class="w-50 m-auto border rounded p-5">
    <div class="">
        <div class="col">
            <label  class="form-label">ID  :  </label>
            <input type="text" id="custId" class="form-control" placeholder="Customer ID" readonly>
        </div>
        <div class="col">
            <label  class="form-label">NAME   : </label>
            <input type="text" id="custName" class="form-control" placeholder="Name">
        </div>
        <div class="col">
            <label  class="form-label">CONTRACT NO :    </label>
            <input type="text" id="custContact" class="form-control" placeholder="Contact">
        </div>
        <div class="col">
            <label  class="form-label">ADDRESS  :    </label>
            <input type="text" id="custAddress" class="form-control" placeholder="Address">
        </div>
       </div>


        <div class="btnset">
        <button class="btn btn-success" id="addCustomer">Add</button>
        <button class="btn btn-warning" id="updateCustomer">Update</button>
        <button class="btn btn-danger" id="deleteCustomer">Delete</button>
        <button class="btn btn-secondary " id="resetBtn">Reset</button>
        </div>

    </form>



    <!============== TABLE =========================>
    <table class="table table-bordered mt-3">
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Contact</th>
            <th>Address</th>
        </tr>
        </thead>
        <tbody id="customerTable"></tbody>
    </table>



</div>


<script src="javascript.js"></script>
<script src="controller/loginController.js"></script>
<script src="controller/dashbarController.js"></script>


</body>
</html>
